  }
  .bg-animation span:nth-child(1){left:10%;width:80px;height:80px;animation-delay:0s}
  .bg-animation span:nth-child(2){left:20%;width:20px;height:20px;animation-delay:2s;animation-duration:12s}
  .bg-animation span:nth-child(3){left:35%;width:60px;height:60px;animation-delay:4s}
  .bg-animation span:nth-child(4){left:50%;width:40px;height:40px;animation-delay:0s;animation-duration:18s}
  .bg-animation span:nth-child(5){left:65%;width:25px;height:25px;animation-delay:0s}
  .bg-animation span:nth-child(6){left:75%;width:70px;height:70px;animation-delay:3s}
  .bg-animation span:nth-child(7){left:85%;width:35px;height:35px;animation-delay:7s}

  /* Разделители по темам */

<script>
const qa = [
  {
    num: 1,
    q: "Кто несет ответственность за эксплуатацию электроустановок в организации?",
    a: `Ответственность за эксплуатацию электроустановок несут:
      <ul>
        <li><strong>Руководитель организации</strong> — общая ответственность за состояние электрохозяйства</li>
        <li><strong>Ответственный за электрохозяйство</strong> (назначается приказом руководителя) — непосредственная техническая ответственность; группа допуска не ниже <strong>IV</strong> (до 1 кВ) или <strong>V</strong> (выше 1 кВ)</li>
        <li><strong>Заместитель ответственного за электрохозяйство</strong> — при его наличии</li>
        <li>Каждый <strong>работник</strong> несёт персональную ответственность за нарушение требований безопасности на своём рабочем месте</li>
      </ul>
      Назначение оформляется приказом и согласовывается с органами Ростехнадзора (для ЭУ выше 1 кВ).`
  },
  {
    num: 2,
    q: "Какую группу допуска по электробезопасности должны иметь лица, эксплуатирующие электроустановки?",
    a: `Требования к группам допуска:
      <ul>
        <li><strong>Группа I</strong> — неэлектротехнический персонал, прошедший инструктаж (работники, использующие бытовые электроприборы)</li>
        <li><strong>Группа II</strong> — лица, допускаемые к работе в ЭУ под надзором; стажёры</li>
        <li><strong>Группа III</strong> — оперативный персонал, выполняющий работы в ЭУ до 1 кВ единолично или в составе бригады</li>
        <li><strong>Группа IV</strong> — ответственный за электрохозяйство в ЭУ до 1 кВ; руководители работ в ЭУ выше 1 кВ</li>
        <li><strong>Группа V</strong> — ответственный за электрохозяйство в ЭУ выше 1 кВ; лица, имеющие право выдачи нарядов</li>
      </ul>`
  },
  {
    num: 3,
    q: "Какая приемо-сдаточная документация представляется после монтажа электрооборудования?",
    a: `После монтажа электрооборудования предъявляется:
      <ul>
        <li>Исполнительные электрические схемы (принципиальные и монтажные) с внесёнными изменениями</li>
        <li>Акты на скрытые работы (прокладка кабелей в трубах, земле, за конструкциями)</li>
        <li>Протоколы измерения сопротивления изоляции</li>
        <li>Протоколы испытания аппаратов защиты (автоматов, предохранителей)</li>
        <li>Паспорта и сертификаты на оборудование и материалы</li>
        <li>Протоколы проверки фазировки и правильности подключения</li>
        <li>Акт ввода электроустановки в эксплуатацию</li>
      </ul>`
  },
  {
    num: 4,
    q: "Перечислите основные организационные мероприятия по эксплуатации электроустановок.",
    a: `Основные организационные мероприятия:
      <ul>
        <li>Назначение <strong>ответственного за электрохозяйство</strong> приказом руководителя</li>
        <li>Составление и утверждение <strong>перечней должностей</strong>, требующих групп допуска I–V</li>
        <li>Организация <strong>обучения и аттестации</strong> электротехнического персонала</li>
        <li>Разработка и поддержание в актуальном состоянии <strong>технической документации</strong> (схемы, журналы, инструкции)</li>
        <li>Составление <strong>графиков ТО и ремонтов</strong> (ППР)</li>
        <li>Обеспечение персонала <strong>средствами защиты</strong> и проверка их исправности</li>
        <li>Ведение <strong>оперативного журнала</strong> и журнала дефектов</li>
      </ul>`
  },
  {
    num: 5,
    q: "Поясните правила эксплуатации внутрицеховых электрических сетей.",
    a: `При эксплуатации внутрицеховых сетей необходимо:
      <ul>
        <li>Поддерживать целостность изоляции проводников и защитных оболочек</li>
        <li>Не допускать перегрузок сверх допустимых токов кабелей и проводов</li>
        <li>Регулярно осматривать крепления, клеммные соединения, вводные устройства</li>
        <li>Проверять сопротивление изоляции не реже 1 раза в 3 года (в сырых помещениях — ежегодно)</li>
        <li>Заземлять металлические корпуса и оболочки кабелей</li>
        <li>Соблюдать нормированные расстояния до трубопроводов и технологического оборудования</li>
      </ul>`
  },
  {
    num: 6,
    q: "Кем и как производится аттестация на группу допуска?",
    a: `Аттестация (проверка знаний) проводится:
      <ul>
        <li><strong>Группы II–IV</strong> в ЭУ до 1 кВ — комиссией предприятия, в состав которой входит ответственный за электрохозяйство (гр. V); не реже <strong>1 раза в год</strong></li>
        <li><strong>Группа V</strong> и ответственные за электрохозяйство — комиссией <strong>Ростехнадзора</strong>; не реже <strong>1 раза в 5 лет</strong></li>
        <li>Внеочередная проверка — при нарушении ПТБ, переводе на другую работу, по требованию надзорных органов</li>
        <li>По результатам оформляется <strong>удостоверение</strong> установленной формы с подписями и печатью</li>
        <li>Первичная аттестация — после обучения и стажировки (не менее 2–14 смен в зависимости от группы)</li>
      </ul>`
  },
  {
    num: 7,
    q: "Каким параметрам должна соответствовать электропроводка?",
    a: `Электропроводки должны соответствовать:
      <ul>
        <li><strong>Напряжению сети</strong> — изоляция рассчитана на номинальное и возможные перенапряжения</li>
        <li><strong>Токовым нагрузкам</strong> — сечение проводников выбирается по допустимому нагреву</li>
        <li><strong>Условиям окружающей среды</strong> — марка провода/кабеля соответствует категории помещения (сырость, пожаро-, взрывоопасность)</li>
        <li><strong>Механической прочности</strong> — защита от повреждений, провисание исключено</li>
        <li>Сопротивление изоляции — не менее <strong>0,5 МОм</strong> для сетей до 1 кВ</li>
        <li>Соответствие <strong>ПУЭ</strong> по способу прокладки и маркировке</li>
      </ul>`
  },
  {
    num: 8,
    q: "Перечислите техническую документацию, которая должна быть у каждого потребителя.",
    a: `Каждый потребитель электрической энергии обязан иметь:
      <ul>

        <li>Однолинейные схемы электроснабжения всех ступеней напряжения</li>
        <li>Оперативные схемы (с актуальным нормальным режимом работы)</li>
        <li>Паспорта и технические документы на оборудование</li>
        <li>Исполнительные чертежи кабельных трасс с раскладкой кабелей</li>
        <li>Журнал учёта и содержания средств защиты</li>
        <li>Оперативный журнал и журнал дефектов</li>
        <li>Инструкции по эксплуатации оборудования и ПТБ</li>
      </ul>`
  },
  {
    num: 9,
    q: "Какие требования предъявляются к рабочему и аварийному освещению?",
    a: `<strong>Рабочее освещение:</strong>
      <ul>
        <li>Обеспечивает нормируемую освещённость рабочих поверхностей по СП 52.13330</li>

      <strong>Аварийное освещение:</strong>
      <ul>
        <li>Обеспечивает <strong>не менее 5%</strong> от нормы рабочего освещения, но не менее <strong>2 лк</strong> внутри зданий</li>
        <li>Питается от <strong>независимого источника</strong> (отдельный ввод, UPS, аккумуляторы, генератор)</li>
        <li>Переключение на резервный источник — автоматически и не более чем за <strong>15 с</strong></li>
        <li>Эвакуационное освещение — не менее <strong>0,5 лк</strong> на полу вдоль эвакуационных путей</li>
      </ul>`
  },
  {
    num: 10,
    q: "Чем отличаются светильники аварийного освещения от светильников рабочего освещения?",
    a: `Отличия светильников аварийного освещения:

        <li>Номинальное напряжение</li>
      </ul>
      <strong>Внутри щитка:</strong>

// Строим навигацию
const navGrid = document.getElementById('navGrid');
const answersSection = document.getElementById('answersSection');

qa.forEach((item, idx) => {
  // Nav item
  const a = document.createElement('a');
  a.className = 'nav-item';
  a.href = `#q${item.num}`;
  a.innerHTML = `<span class="nav-num">№${item.num}</span><span>${item.q}</span>`;
  a.addEventListener('click', (e) => {
    e.preventDefault();
    const target = document.getElementById(`q${item.num}`);
    if (target) {
      target.scrollIntoView({ behavior: 'smooth', block: 'start' });
      target.classList.add('highlighted');
      setTimeout(() => target.classList.remove('highlighted'), 2000);
    }
  });
  navGrid.appendChild(a);

  // Section dividers
  const dividers = {1:'📋 Организация эксплуатации электроустановок', 14:'📡 Электропроводки и освещение', 24:'⚙️ Электрические машины', 37:'🔌 Кабельные линии', 46:'🏭 Трансформаторные подстанции и РУ'};
  if (dividers[item.num]) {
    const div = document.createElement('div');
    div.className = 'section-header';
    div.innerHTML = `<span>${dividers[item.num]}</span>`;
    answersSection.appendChild(div);
  }

  // QA card
  const card = document.createElement('div');
  card.className = 'qa-card';
  card.id = `q${item.num}`;
  card.innerHTML = `
    <div class="qa-question">
      <div class="q-badge">№${item.num}</div>
      <div class="q-text">${item.q}</div>
    </div>
    <div class="qa-answer">
      <div class="answer-text">${item.a}</div>
    </div>`;
  answersSection.appendChild(card);
});

// Кнопка наверх
const btnTop = document.getElementById('btnTop');
window.addEventListener('scroll', () => {
  btnTop.classList.toggle('visible', window.scrollY > 400);
});
</script>
